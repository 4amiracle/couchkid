---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merch — Couch Kid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: "Space Grotesk", sans-serif;
      color: #111;
      min-height: 100vh;
      padding: 6rem 2rem 3rem;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      z-index: 10;
      background: #fff;
    }

    nav a {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: #111;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: #555;
    }

    .merch-container {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .page-header h1 {
      font-family: "Figtree", sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .featured-image {
      width: 100%;
      max-width: 550px;
      height: 400px;
      overflow: hidden;
    }

    .featured-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: object-position 0.4s ease, transform 0.4s ease;
      transform: scale(1);
    }

    .featured-image img.hidden {
      display: none;
    }

    .featured-image img.zoom-tshirt {
      object-position: 25% center;
      transform: scale(1.4);
    }

    .featured-image img.zoom-hoodie {
      object-position: 75% center;
      transform: scale(1.4);
    }

    .color-thumbs {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .color-thumb {
      text-align: center;
      cursor: pointer;
    }

    .color-thumb img {
      width: 80px;
      height: auto;
      border: 3px solid transparent;
      transition: border-color 0.2s ease;
      opacity: 0.5;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .color-thumb.active img {
      border-color: #111;
      opacity: 1;
    }

    .color-label {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: 0.35rem;
    }

    .order-form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .order-form label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .order-form input,
    .order-form select,
    .order-form textarea {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.95rem;
      padding: 0.6rem 0.75rem;
      border: 2px solid #111;
      border-radius: 0;
      background: #fff;
      color: #111;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
    }

    .order-form input:focus,
    .order-form select:focus,
    .order-form textarea:focus {
      border-color: #555;
    }

    .order-form textarea {
      resize: vertical;
      min-height: 60px;
    }

    .order-form button {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.75rem 1.5rem;
      background: #111;
      color: #fff;
      border: 2px solid #111;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .order-form button:hover {
      background: #fff;
      color: #111;
    }

    .confirmation {
      display: none;
      text-align: center;
      max-width: 400px;
    }

    .confirmation h2 {
      font-family: "Figtree", sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .confirmation p {
      font-family: "Figtree", sans-serif;
      font-size: 1rem;
      color: #555;
    }

    .confirmation a {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #111;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .confirmation a:hover {
      color: #555;
    }

    @media (max-width: 480px) {
      nav {
        padding: 1rem 1.25rem;
      }

      body {
        padding-top: 5rem;
      }

      .order-form {
        max-width: 100%;
      }

      .order-form input,
      .order-form select,
      .order-form textarea {
        padding: 0.75rem 1rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/story' | relative_url }}">Story</a>
  </nav>

  <div class="merch-container" id="merch-content">
    <div class="page-header">
      <h1>merch.</h1>
    </div>

    <div class="featured-image">
      <img src="{{ '/assets/images/merch.png' | relative_url }}" alt="Couch Kid Cream" id="featured-cream" data-color="cream">
      <img src="{{ '/assets/images/merch-black.png' | relative_url }}" alt="Couch Kid Black" id="featured-black" data-color="black" class="hidden">
    </div>

    <div class="color-thumbs">
      <div class="color-thumb active" data-color="cream">
        <img src="{{ '/assets/images/merch.png' | relative_url }}" alt="Cream">
        <p class="color-label">Cream</p>
      </div>
      <div class="color-thumb" data-color="black">
        <img src="{{ '/assets/images/merch-black.png' | relative_url }}" alt="Black">
        <p class="color-label">Black</p>
      </div>
    </div>

    <form class="order-form" id="order-form">
      <label>
        Color
        <select name="color" id="color-select" required>
          <option value="cream" selected>Cream</option>
          <option value="black">Black</option>
        </select>
      </label>
      <label>
        Item
        <select name="item" required>
          <option value="" disabled selected>Select item</option>
          <option value="tshirt">T-Shirt</option>
          <option value="hoodie">Hoodie</option>
          <option value="both">Both</option>
        </select>
      </label>
      <label>
        Size
        <select name="size" required>
          <option value="" disabled selected>Select size</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
        </select>
      </label>
      <label>
        Name
        <input type="text" name="name" required>
      </label>
      <label>
        Email
        <input type="email" name="email" required>
      </label>
      <label>
        Shipping Address
        <textarea name="address" rows="3" required></textarea>
      </label>
      <label>
        Notes (optional)
        <textarea name="notes" rows="2"></textarea>
      </label>
      <button type="submit">Place Order</button>
    </form>
  </div>

  <div class="confirmation" id="confirmation">
    <h2>Order Received</h2>
    <p>We'll be in touch at the email you provided.</p>
    <a href="{{ '/' | relative_url }}">Back to Home</a>
  </div>

  <script>
    var thumbs = document.querySelectorAll(".color-thumb");
    var featuredImages = document.querySelectorAll(".featured-image img");
    var colorSelect = document.getElementById("color-select");
    var itemSelect = document.querySelector('select[name="item"]');

    function selectColor(color) {
      thumbs.forEach(function (t) { t.classList.remove("active"); });
      featuredImages.forEach(function (img) { img.classList.add("hidden"); });

      var activeThumb = document.querySelector('.color-thumb[data-color="' + color + '"]');
      var activeImg = document.querySelector('.featured-image img[data-color="' + color + '"]');
      if (activeThumb) activeThumb.classList.add("active");
      if (activeImg) activeImg.classList.remove("hidden");
      colorSelect.value = color;
    }

    thumbs.forEach(function (thumb) {
      thumb.addEventListener("click", function () {
        selectColor(thumb.getAttribute("data-color"));
      });
    });

    colorSelect.addEventListener("change", function () {
      selectColor(colorSelect.value);
    });

    itemSelect.addEventListener("change", function () {
      var val = itemSelect.value;
      featuredImages.forEach(function (img) {
        img.classList.remove("zoom-tshirt", "zoom-hoodie");
        if (val === "tshirt") img.classList.add("zoom-tshirt");
        else if (val === "hoodie") img.classList.add("zoom-hoodie");
      });
    });

    document.getElementById("order-form").addEventListener("submit", function (e) {
      e.preventDefault();
      document.getElementById("merch-content").style.display = "none";
      document.getElementById("confirmation").style.display = "block";
    });
  </script>
</body>
</html>
