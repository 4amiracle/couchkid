<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: "Space Grotesk", sans-serif;
      color: #111;
      min-height: 100vh;
      padding: 6rem 2rem 3rem;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      z-index: 10;
      background: #fff;
    }

    nav a {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: #111;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: #555;
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-header h1 {
      font-family: "Figtree", sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .emotion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .emotion-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      padding: 1.5rem;
      border: 2px solid #111;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .emotion-card:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
    }

    .emotion-card.active {
      background: #111;
      color: #fff;
    }

    .emotion-card.active .emotion-label {
      color: #fff;
    }

    .emotion-card.active svg {
      stroke: #fff;
    }

    .emotion-label {
      font-family: "Figtree", sans-serif;
      font-size: 1.125rem;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: 0.02em;
      color: #111;
    }

    .emotion-icon {
      width: 150px;
      height: 100px;
    }

    .emotion-icon svg {
      width: 100%;
      height: 100%;
    }

    .emotion-content {
      display: none;
      max-width: 600px;
      margin: 3rem auto 0;
      text-align: center;
      padding: 2rem;
      border-top: 2px solid #111;
    }

    .emotion-content.visible {
      display: block;
    }

    .emotion-content h2 {
      font-family: "Figtree", sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .emotion-content p {
      font-family: "Figtree", sans-serif;
      font-weight: 400;
      color: #2563EB;
      font-size: 1.125rem;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      nav {
        padding: 1rem 1.25rem;
      }

      body {
        padding-top: 5rem;
      }

      .emotion-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      .emotion-card {
        padding: 1rem;
      }

      .emotion-icon {
        width: 120px;
        height: 80px;
      }
    }
  </style>
</head>

  <script>
    (function () {
      var password = prompt("Enter password to access Emotions:");
      if (password !== "couchkid") {
        window.location.href = "{{ '/' | relative_url }}";
        return;
      }

      var cards = document.querySelectorAll(".emotion-card");
      var contentArea = document.getElementById("emotion-content");
      var emotionTitle = document.getElementById("emotion-title");

      cards.forEach(function (card) {
        card.addEventListener("click", function () {
          var emotion = card.getAttribute("data-emotion");

          cards.forEach(function (c) { c.classList.remove("active"); });
          card.classList.add("active");

          emotionTitle.textContent = emotion + ".";
          contentArea.classList.add("visible");

          contentArea.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      });
    })();
  </script>
